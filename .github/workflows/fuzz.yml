name: Fuzzing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  fuzz:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Clang
      run: |
        sudo apt-get update
        sudo apt-get install -y clang

    - name: Build Fuzz Targets
      run: |
        cd tests/fuzz
        mkdir build
        cd build
        CXX=clang++ cmake -DENABLE_FUZZING=ON ..
        make

    - name: Run MIDI Parser Fuzzer
      run: |
        cd tests/fuzz/build
        ./fuzz_midi_parser ../corpus/midi -max_total_time=60 -max_len=1048576
      continue-on-error: true

    - name: Run M3U Parser Fuzzer
      run: |
        cd tests/fuzz/build
        ./fuzz_m3u_parser ../corpus/m3u -max_total_time=60 -max_len=65536
      continue-on-error: true

    - name: Run XSPF Parser Fuzzer
      run: |
        cd tests/fuzz/build
        ./fuzz_xspf_parser ../corpus/xspf -max_total_time=60 -max_len=65536
      continue-on-error: true

    - name: Archive Crash Artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: fuzz-crashes
        path: tests/fuzz/build/crash-*
        if-no-files-found: ignore
