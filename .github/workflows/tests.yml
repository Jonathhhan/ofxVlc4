name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  cmake-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S tests -B build/tests

      - name: Build
        run: cmake --build build/tests --parallel

      - name: Run tests
        run: ctest --test-dir build/tests --output-on-failure
